<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stallify - Register</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="auth-container fade-in">
        <div class="glass-card auth-card">
            <div class="logo">🍦</div>
            <h2>Create Account</h2>
            <form id="registerForm">
                <input type="text" id="name" class="glass-input" placeholder="Full Name" required>
                <input type="email" id="email" class="glass-input" placeholder="Email Address" required>
                <input type="password" id="password" class="glass-input" placeholder="Password" required>
                <button type="submit" class="neon-btn">Sign Up</button>
            </form>
            <div class="auth-links">
                Already have an account? <a href="login.html">Sign In</a>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = e.target.querySelector('button');
            
            try {
                btn.disabled = true;
                btn.innerText = 'Creating account...';
                
                await apiFetch('/api/auth/register', {
                    method: 'POST',
                    body: JSON.stringify({ name, email, password })
                });
                
                showToast('Registration successful! Please login.');
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 1500);
            } catch (error) {
                btn.disabled = false;
                btn.innerText = 'Sign Up';
            }
        });
    </script>
    <footer class="site-footer">
        <p>Developed by <strong>Karoliya Agin Doli</strong></p>
        <p>Email: karoliyaagindoli22@gmail.com</p>
        <p>
            GitHub:
            <a href="https://github.com/karo2203" target="_blank">
                github.com/karo2203
            </a>
        </p>
    </footer>
</body>
</html>
