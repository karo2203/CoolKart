<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stallify - Home</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="home.css">
</head>
<body>
    <header class="navbar glass-panel">
        <div class="nav-left">
            <span class="logo">🍦 Stallify</span>
        </div>
        <div class="nav-middle">
            <input type="text" id="searchInput" class="glass-input search-bar" placeholder="Search menu...">
        </div>
        <div class="nav-right">
            <span id="userNameDisplay">User</span>
            <div class="cart-icon" onclick="toggleCart()">
                🛒 <span id="cartCount" class="badge">0</span>
            </div>
            <button class="neon-btn small-btn" onclick="logout()">Logout</button>
        </div>
    </header>

    <main class="main-content">
        <!-- AI Recommendation Section -->
        <section class="recommendation-section fade-in">
            <div class="glass-card recommendation-card">
                <h3>✨ Recommended for you</h3>
                <p>Try our most ordered: <strong id="popularItem" class="neon-text">Loading...</strong></p>
            </div>
        </section>

        <!-- Menu Section -->
        <section class="menu-section fade-in">
            <h2 class="section-title">Ice Cream</h2>
            <div class="menu-grid" id="iceCreamGrid"></div>
            
            <h2 class="section-title mt-4">Juice</h2>
            <div class="menu-grid" id="juiceGrid"></div>
        </section>
    </main>

    <!-- Sliding Cart -->
    <div id="cartPanel" class="cart-panel glass-panel">
        <div class="cart-header">
            <h2>Your Cart</h2>
            <button class="close-btn" onclick="toggleCart()">✖</button>
        </div>
        <div class="cart-items" id="cartItemsContainer">
            <!-- Items injected by JS -->
        </div>
        <div class="cart-footer">
            <div class="cart-total">
                <span>Subtotal</span>
                <span id="cartSubtotal">₹0</span>
            </div>
            <select id="paymentMethod" class="glass-input">
                <option value="Cash on Delivery">Cash on Delivery</option>
                <option value="Online Payment">Online Payment</option>
            </select>
            <button class="neon-btn place-order-btn" onclick="placeOrder()">Place Order</button>
        </div>
    </div>

    <!-- Order Success Modal -->
    <div id="orderModal" class="modal-overlay hidden">
        <div class="glass-card modal-content text-center">
            <h3>✔ Order placed successfully</h3>
            <p>Your token number: <strong id="modalToken" class="neon-text"></strong></p>
            <p>Payment: <span id="modalPayment"></span></p>
            <button class="neon-btn mt-3" onclick="closeModal()">Close</button>
        </div>
    </div>

    <script src="script.js"></script>
    <script src="home.js"></script>
    <footer class="site-footer">
        <p>Developed by <strong>Karoliya Agin Doli</strong></p>
        <p>Email: karoliyaagindoli22@gmail.com</p>
        <p>
            GitHub:
            <a href="https://github.com/karo2203" target="_blank">
                github.com/karo2203
            </a>
        </p>
    </footer>
</body>
</html>
